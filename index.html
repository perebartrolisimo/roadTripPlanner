<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viatge a Catalunya 2026</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #333;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.4rem;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.25);
            letter-spacing: 0.5px;
        }

        header p.subtitle {
            color: rgba(255,255,255,0.85);
            font-size: 1.05rem;
            margin-top: 0.4rem;
        }

        /* ── Stop cards ─────────────────────────────────────── */
        #stops-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .stop-card {
            background: #fff;
            border-radius: 14px;
            padding: 1.5rem 1.75rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stop-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.16);
        }

        .stop-card h2 {
            font-size: 1.2rem;
            color: #5a3e9b;
            margin-bottom: 0.6rem;
            padding-right: 2.5rem;
        }

        .stop-card .route-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            color: #555;
        }

        .stop-card .route-info a {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s;
        }

        .stop-card .route-info a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .stop-card .distance-badge {
            background: #ede9fb;
            color: #5a3e9b;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .stop-card h3 {
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #999;
            margin-bottom: 0.3rem;
        }

        .stop-card .hotel-link a {
            color: #e07b39;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.98rem;
            transition: color 0.15s;
        }

        .stop-card .hotel-link a:hover {
            color: #b85e25;
            text-decoration: underline;
        }

        .delete-btn {
            position: absolute;
            top: 1.1rem;
            right: 1.1rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #ccc;
            font-size: 1.3rem;
            line-height: 1;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }

        .delete-btn:hover {
            color: #e05252;
            background: #fde8e8;
        }

        /* ── Add-stop form ──────────────────────────────────── */
        .form-card {
            background: #fff;
            border-radius: 14px;
            padding: 1.75rem 1.75rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .form-card h2 {
            font-size: 1.15rem;
            color: #5a3e9b;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 580px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.7rem;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .form-group input {
            padding: 0.6rem 0.85rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #333;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            width: 100%;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.18);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .btn-add {
            margin-top: 1.25rem;
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-add:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        /* ── Empty state ────────────────────────────────────── */
        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 1rem;
            padding: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🗺️ Viatge a Catalunya - Juny 2026</h1>
        <p class="subtitle">Planificació de ruta · Road trip planner</p>
    </header>

    <div id="stops-container"></div>

    <div class="form-card">
        <h2>➕ Afegir nova parada</h2>
        <form id="add-stop-form" novalidate>
            <div class="form-grid">
                <div class="form-group">
                    <label for="f-date">Data</label>
                    <input type="text" id="f-date" placeholder="29 de juny" required>
                </div>
                <div class="form-group">
                    <label for="f-distance">Distància (km)</label>
                    <input type="text" id="f-distance" placeholder="670 km" required>
                </div>
                <div class="form-group">
                    <label for="f-origin">Origen</label>
                    <input type="text" id="f-origin" placeholder="Uppsala (SE)" required>
                </div>
                <div class="form-group">
                    <label for="f-destination">Destinació</label>
                    <input type="text" id="f-destination" placeholder="Lund (SE)" required>
                </div>
                <div class="form-group full-width">
                    <label for="f-route-url">URL de la ruta (Google Maps)</label>
                    <input type="url" id="f-route-url" placeholder="https://www.google.com/maps/dir/..." required>
                </div>
                <div class="form-group">
                    <label for="f-hotel-name">Hotel / Allotjament</label>
                    <input type="text" id="f-hotel-name" placeholder="Hotel L" required>
                </div>
                <div class="form-group">
                    <label for="f-hotel-url">URL de l'hotel</label>
                    <input type="url" id="f-hotel-url" placeholder="https://...">
                </div>
            </div>
            <button type="submit" class="btn-add">Afegir parada</button>
        </form>
    </div>
</div>

<script>
    // ── Default stops (preserved from original HTML) ──────────────────────
    const DEFAULT_STOPS = [
        {
            id: 'default-1',
            date: '29 de juny',
            origin: 'Uppsala (SE)',
            destination: 'Lund (SE)',
            routeUrl: 'https://www.google.com/maps/dir/Kronparksv%C3%A4gen+15,+757+52+Uppsala/Motel+L+Lund,+Telefongatan+14,+224+81+Lund/@57.770648,12.7658852,710140m/data=!3m2!1e3!4b1!4m14!4m13!1m5!1m1!1s0x465fc910f98e112f:0x94bb25986a02327c!2m2!1d17.6946894!2d59.823451!1m5!1m1!1s0x465397562aeaa465:0xa0510b0158027651!2m2!1d13.2294099!2d55.7174207!3e0?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D',
            distance: '670 km',
            hotelName: 'Hotel L',
            hotelUrl: 'https://ligula.se/sv/motel-l/motel-l-lund/'
        },
        {
            id: 'default-2',
            date: '30 de juny',
            origin: 'Lund (SE)',
            destination: 'Oldenburg (DE)',
            routeUrl: 'https://www.google.com/maps/dir/Kronparksv%C3%A4gen+15,+757+52+Uppsala/Motel+L+Lund,+Telefongatan+14,+224+81+Lund/@57.770648,12.7658852,710140m/data=!3m2!1e3!4b1!4m14!4m13!1m5!1m1!1s0x465fc910f98e112f:0x94bb25986a02327c!2m2!1d17.6946894!2d59.823451!1m5!1m1!1s0x465397562aeaa465:0xa0510b0158027651!2m2!1d13.2294099!2d55.7174207!3e0?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D',
            distance: '670 km',
            hotelName: 'Casa Mike',
            hotelUrl: 'https://www.google.se/maps/place/Klockarev%C3%A4gen+123,+233+41+Svedala/@55.5155568,13.2224448,687m/data=!3m2!1e3!4b1!4m6!3m5!1s0x46539ddc1b228b53:0x4d26d07fac694fba!8m2!3d55.5155538!4d13.2250197!16s%2Fg%2F11crsx3z7j?entry=ttu'
        }
    ];

    // ── Storage helpers ───────────────────────────────────────────────────
    const STORAGE_KEY = 'roadTripPlanner_stops';

    function loadStops() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : null;
        } catch (e) {
            return null;
        }
    }

    function saveStops(stops) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stops));
    }

    // ── Render ────────────────────────────────────────────────────────────
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function renderStops(stops) {
        const container = document.getElementById('stops-container');
        if (stops.length === 0) {
            container.innerHTML = '<p class="empty-state">No hi ha parades. Afegeix-ne una! 🚗</p>';
            return;
        }
        container.innerHTML = stops.map(stop => `
            <div class="stop-card" data-id="${escapeHtml(stop.id)}">
                <h2>${escapeHtml(stop.date)} ${escapeHtml(stop.origin)} - ${escapeHtml(stop.destination)}</h2>
                <div class="route-info">
                    <a target="_blank" href="${escapeHtml(stop.routeUrl)}">🗺️ Ruta / Väg</a>
                    <span class="distance-badge">${escapeHtml(stop.distance)}</span>
                </div>
                <h3>Hotel:</h3>
                <div class="hotel-link">
                    <a target="_blank" href="${escapeHtml(stop.hotelUrl)}">🏨 ${escapeHtml(stop.hotelName)}</a>
                </div>
                <button class="delete-btn" title="Eliminar parada" aria-label="Eliminar parada">✕</button>
            </div>
        `).join('');

        container.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const card = btn.closest('.stop-card');
                const id = card.dataset.id;
                deleteStop(id);
            });
        });
    }

    // ── CRUD ──────────────────────────────────────────────────────────────
    let stops = loadStops() || DEFAULT_STOPS.slice();

    function deleteStop(id) {
        stops = stops.filter(s => s.id !== id);
        saveStops(stops);
        renderStops(stops);
    }

    function addStop(stop) {
        stops.push(stop);
        saveStops(stops);
        renderStops(stops);
    }

    // ── Form submission ───────────────────────────────────────────────────
    document.getElementById('add-stop-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const date       = document.getElementById('f-date').value.trim();
        const origin     = document.getElementById('f-origin').value.trim();
        const destination = document.getElementById('f-destination').value.trim();
        const routeUrl   = document.getElementById('f-route-url').value.trim();
        const distance   = document.getElementById('f-distance').value.trim();
        const hotelName  = document.getElementById('f-hotel-name').value.trim();
        const hotelUrl   = document.getElementById('f-hotel-url').value.trim();

        if (!date || !origin || !destination || !routeUrl || !distance || !hotelName) {
            alert('Si us plau, omple tots els camps obligatoris.');
            return;
        }

        const newStop = {
            id: 'stop-' + Date.now(),
            date,
            origin,
            destination,
            routeUrl,
            distance,
            hotelName,
            hotelUrl: hotelUrl || '#'
        };

        addStop(newStop);
        this.reset();
    });

    // ── Init ──────────────────────────────────────────────────────────────
    renderStops(stops);
</script>
</body>
</html>
